<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha área — Pietra Rebello</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{color-scheme:light;--txt:#4b3b58;--muted:#9a8aa6;--line:#f2e2ec;--pink:#ec4899;--pink-deep:#db2777}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body{min-height:100vh;background:linear-gradient(180deg,#fdf2f8,#f6f1fe 45%,#eef5ff);color:var(--txt)}
  nav.top{background:rgba(253,244,248,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  nav.top .in{max-width:1040px;margin:0 auto;padding:0 20px;height:66px;display:flex;align-items:center;justify-content:space-between}
  .logo{height:32px}
  .logout{border:1.5px solid var(--pink);color:var(--pink-deep);background:#fff;border-radius:12px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .wrap{max-width:1040px;margin:0 auto;padding:26px 20px 60px}
  .hello{font-size:21px;font-weight:800;margin-bottom:4px}
  .role-chip{display:inline-block;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;margin-bottom:18px}
  .chip-creator{background:#ede9fe;color:#6d28d9}
  .chip-professional{background:#dbeafe;color:#1d4ed8}
  .chip-student{background:#fce7f3;color:#be185d}

  .shell{display:grid;grid-template-columns:212px 1fr;gap:20px;align-items:start}
  .sidebar{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;
           box-shadow:0 8px 22px rgba(180,90,140,.06);position:sticky;top:86px}
  .navitem{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;
           padding:11px 12px;border-radius:12px;font-size:14px;font-weight:600;color:var(--txt);cursor:pointer;text-align:left}
  .navitem:hover{background:#faf3f8}
  .navitem.active{background:linear-gradient(120deg,#fce7f3,#e0e7ff);color:var(--pink-deep);font-weight:800}
  .navitem .ico{font-size:15px;line-height:1}

  .panel h2{font-size:18px;font-weight:800;margin-bottom:14px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;
        box-shadow:0 8px 22px rgba(180,90,140,.06);margin-bottom:16px}
  .card h3{font-size:15px;font-weight:800;color:var(--pink-deep);margin-bottom:8px}
  .card p{font-size:14px;color:var(--muted);line-height:1.55}
  .btn{display:inline-block;border:none;border-radius:12px;padding:11px 20px;font-weight:700;font-size:14px;color:#fff;cursor:pointer;text-decoration:none;
       background:linear-gradient(120deg,#f472b6,#818cf8);box-shadow:0 6px 16px rgba(236,72,153,.2);margin-top:8px}
  .btn.small{padding:8px 14px;font-size:13px;box-shadow:none}
  .btn.ghost{background:#fff;color:var(--pink-deep);border:1.5px solid var(--line)}
  .tag{display:inline-block;background:#fff7ed;color:#b45309;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid #fed7aa}
  #loading{text-align:center;padding:80px 20px;color:var(--muted)}
  .student-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .student-row:last-child{border-bottom:none}
  .student-row .name{font-weight:700;font-size:14px}
  .student-row .meta{font-size:12px;color:var(--muted)}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit}
  .field input:focus,.field textarea:focus{outline:2px solid #f9a8d4;border-color:#f9a8d4}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .msg{margin-top:10px;font-size:13px;padding:9px 11px;border-radius:9px;display:none;line-height:1.45}
  .msg.err{display:block;background:#fdecec;color:#c0392b}
  .msg.ok{display:block;background:#eafaf0;color:#1a8a4a}
  .empty{font-size:13px;color:var(--muted);padding:8px 0}
  .assess-item{font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .assess-item:last-child{border-bottom:none}
  .assess-item b{color:var(--pink-deep)}
  .close-x{float:right;cursor:pointer;color:var(--muted);font-weight:800;font-size:18px;line-height:1}

  /* avaliações e consultas do aluno */
  .aval{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:#fffdfe}
  .aval-head{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:10px}
  .meds{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .med{background:#faf3f8;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12.5px;
       display:flex;gap:7px;align-items:center;justify-content:space-between}
  @media(max-width:520px){ .meds{grid-template-columns:1fr} }
  .aval-body{display:none;margin-top:12px}
  .aval.open .aval-body{display:block}
  .chev{border:none;background:none;cursor:pointer;color:var(--pink-deep);font-size:13px;line-height:1;
        padding:4px 6px;border-radius:8px;transition:transform .18s ease}
  .chev:hover{background:#faf3f8}
  .aval.open .chev{transform:rotate(90deg)}
  .med span{color:var(--muted);font-weight:600}
  .med b{color:var(--pink-deep);font-weight:800}
  .dif{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:-4px}
  .dif.up{background:#fff1f2;color:#be123c}
  .dif.down{background:#eafaf0;color:#1a8a4a}
  .obs{margin-top:11px;font-size:13px;line-height:1.55;color:var(--txt);background:#f8f6ff;border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:10px 12px}
  .meta-sm{font-size:12px;color:var(--muted);margin-top:8px}
  .proxima{background:linear-gradient(120deg,#fce7f3,#e0e7ff);border-radius:14px;padding:18px}
  .proxima .quando{font-size:19px;font-weight:800;color:var(--pink-deep)}

  /* menu de 3 pontinhos */
  .menu-wrap{position:relative;display:inline-block}
  .menu-drop{display:none;position:absolute;right:0;top:calc(100% + 6px);z-index:30;background:#fff;
    border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 28px rgba(120,60,100,.16);
    min-width:160px;overflow:hidden;padding:4px}
  .menu-drop.open{display:block}
  .menu-drop button{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;
    padding:10px 12px;font-size:13.5px;font-weight:600;color:var(--txt);border-radius:9px}
  .menu-drop button:hover{background:#faf3f8;color:var(--pink-deep)}
  .dots{font-size:16px;line-height:1;letter-spacing:1px}

  /* formulário de avaliação */
  .form-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grupo{margin-top:16px}
  .grupo-tit{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
    padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:12px}
  @media(max-width:640px){ .form-grid3{grid-template-columns:1fr 1fr} }

  @media(max-width:760px){
    .shell{grid-template-columns:1fr}
    .sidebar{position:static;display:flex;gap:6px;overflow-x:auto;padding:8px;-webkit-overflow-scrolling:touch}
    .navitem{white-space:nowrap;padding:9px 12px;font-size:13px;width:auto}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<nav class="top"><div class="in">
  <a href="index.html"><img class="logo" src="logo.png" alt="Pietra Rebello"></a>
  <button class="logout" onclick="sair()">Sair</button>
</div></nav>

<div class="wrap">
  <div id="loading">Carregando…</div>
  <div id="content" style="display:none"></div>
</div>

<script>
  const SUPABASE_URL = "https://qubjknesswejsddcapom.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1YmprbmVzc3dlanNkZGNhcG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTYzNTYsImV4cCI6MjA5OTkzMjM1Nn0._nDLQ_Q5wN-4eNS0jf-lnyhGHixoZ5_SdXvTvBV_d3E";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { flowType: "implicit", detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });

  let ME = null, STUDENTS = [], INVITES = [], ASSESS = [], VIEW = null, EDIT_ID = null;

  // campos das avaliações
  const DOBRAS = [
    ["tricipital","Tricipital"], ["subescapular","Subescapular"], ["peitoral","Peitoral"],
    ["axilar_media","Axilar média"], ["suprailiaca","Suprailíaca"], ["abdominal","Abdominal"], ["coxa","Coxa"]
  ];
  const PERIMETROS = [
    ["ombro","Ombro"], ["braco_relaxado","Braço relaxado"], ["braco_contraido","Braço contraído"],
    ["cintura","Cintura"], ["abdominal","Abdominal"], ["quadril","Quadril"],
    ["coxa","Coxa"], ["panturrilha","Panturrilha"]
  ];
  const GERAIS = [
    ["weight","Peso"," kg"], ["height","Altura"," cm"], ["body_fat","% Gordura","%"],
    ["lean_mass","Massa magra"," kg"], ["fat_mass","Massa gorda"," kg"]
  ];

  async function sair(){ await sb.auth.signOut(); location.href = "login.html"; }
  function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function fmtDate(d){ if(!d) return "—"; const p=String(d).slice(0,10).split("-"); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
  function shortId(id){ return String(id||"").slice(0,8); }
  function primeiroNome(){ const n=(ME.full_name||"").trim(); return n?n.split(/\s+/)[0]:""; }
  function nomeAluno(s){ return s ? (s.full_name || s.email || ("Aluno "+shortId(s.id))) : "Aluno"; }

  /* ================= INÍCIO ================= */
  async function init(){
    let { data:{ session } } = await sb.auth.getSession();
    if(!session){
      session = await new Promise(res=>{
        const t=setTimeout(()=>res(null), 2500);
        sb.auth.onAuthStateChange((_e,s)=>{ if(s){ clearTimeout(t); res(s); } });
      });
    }
    if(!session){ location.href = "login.html"; return; }
    const user = session.user;
    let { data: profile } = await sb.from("profiles").select("*").eq("id", user.id).single();
    if(!profile) profile = { id:user.id, role:"student", full_name:null, professional_id:null, status:"active" };
    ME = { ...profile, email: user.email };
    montar();
  }

  /* ================= MENU / LAYOUT ================= */
  function menuFor(role){
    if(role === "student") return [
      {id:"dash",       ico:"📊", label:"Meu dashboard"},
      {id:"avaliacoes", ico:"📋", label:"Avaliações Físicas"},
      {id:"consultas",  ico:"📅", label:"Consultas Nutri"},
      {id:"perfil",     ico:"👤", label:"Perfil"}
    ];
    const m = [
      {id:"alunos",    ico:"👥", label:"Meus alunos"},
      {id:"cadastrar", ico:"➕", label:"Cadastrar aluno"},
      {id:"inativos",  ico:"📁", label:"Alunos inativos"},
      {id:"perfil",    ico:"👤", label:"Meu perfil"}
    ];
    if(role === "creator") m.push({id:"admin", ico:"🛠️", label:"Painel do criador"});
    return m;
  }

  function montar(){
    const role = ME.role || "student";
    const rotulo = {creator:"Criador", professional:"Profissional", student:"Aluno"}[role] || role;
    const first = primeiroNome();

    // aluno arquivado: sem menu, só o aviso
    if(role === "student" && ME.status === "archived"){
      document.getElementById("content").innerHTML = `
        <div class="hello">${first ? "Olá, "+esc(first) : "Olá!"}</div>
        <div class="card"><h3>⏸️ Acompanhamento inativo</h3>
        <p>Seu acompanhamento está pausado no momento, então o painel fica indisponível.
           Seu histórico continua guardado. Fale com sua nutricionista para reativar.</p></div>`;
      mostrar();
      return;
    }

    const itens = menuFor(role).map(i=>
      `<button class="navitem" id="nav_${i.id}" onclick="go('${i.id}')">
         <span class="ico">${i.ico}</span><span class="lbl">${i.label}</span></button>`).join("");

    document.getElementById("content").innerHTML = `
      <div class="hello">${first ? "Olá, "+esc(first)+" 👋" : "Olá! 👋"}</div>
      <div class="role-chip chip-${role}">${rotulo}</div>
      <div class="shell">
        <aside class="sidebar">${itens}</aside>
        <section class="panel" id="panel"></section>
      </div>`;
    mostrar();

    const inicial = !first ? "perfil" : (role === "student" ? "dash" : "alunos");
    go(inicial);
  }

  function mostrar(){
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  function go(id){
    VIEW = id;
    document.querySelectorAll(".navitem").forEach(b=>b.classList.remove("active"));
    const nav = document.getElementById("nav_"+id); if(nav) nav.classList.add("active");
    const p = document.getElementById("panel"); if(!p) return;

    if(id === "dash")      p.innerHTML = viewDash();
    else if(id === "avaliacoes"){ p.innerHTML = viewAvaliacoes(); carregarMinhasAvaliacoes(); }
    else if(id === "consultas"){  p.innerHTML = viewConsultas();  carregarMinhasConsultas(); }
    else if(id === "perfil")p.innerHTML = viewPerfil();
    else if(id === "admin")p.innerHTML = viewAdmin();
    else if(id === "alunos"){    p.innerHTML = viewAlunos();    loadStudents(); }
    else if(id === "cadastrar"){ p.innerHTML = viewCadastrar(); loadStudents(); }
    else if(id === "inativos"){  p.innerHTML = viewInativos();  loadStudents(); }
    window.scrollTo({top:0, behavior:"smooth"});
  }

  /* ================= TELAS: ALUNO ================= */
  function viewDash(){
    return `<h2>Meu dashboard</h2>
      <div class="card">
        <h3>📊 Sua evolução</h3>
        <p>Acompanhe peso, composição, sono e adesão — e envie seus reports pelo Telegram.</p>
        <a class="btn" href="dashboard.html">Abrir meu dashboard →</a>
      </div>`;
  }

  async function definirSenha(){
    const p1=document.getElementById("np1").value, p2=document.getElementById("np2").value;
    const msg=document.getElementById("pwMsg"), btn=document.getElementById("pwBtn");
    if(p1.length<6){ msg.className="msg err"; msg.textContent="A senha precisa ter ao menos 6 caracteres."; return; }
    if(p1!==p2){ msg.className="msg err"; msg.textContent="As senhas não coincidem."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.auth.updateUser({ password:p1 });
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro: "+error.message; return; }
    msg.className="msg ok"; msg.textContent="Senha salva! Já pode entrar com e-mail e senha.";
    document.getElementById("np1").value=""; document.getElementById("np2").value="";
  }

  /* ---------- ALUNO: AVALIAÇÕES FÍSICAS ---------- */
  function viewAvaliacoes(){
    return `<h2>Avaliações Físicas</h2>
      <div class="card">
        <h3>📋 Minhas avaliações</h3>
        <p>Todos os dados levantados pela sua nutricionista, da mais recente para a mais antiga.</p>
        <div id="avalBox" style="margin-top:12px"><div class="empty">Carregando…</div></div>
      </div>`;
  }

  function fmtDataHora(v){
    if(!v) return "—";
    const d = new Date(v);
    if(isNaN(d)) return fmtDate(v);
    return d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  }
  function med(rot, val, un){
    if(val==null || val==="") return "";
    return `<div class="med"><span>${rot}</span><b>${Number(val).toLocaleString("pt-BR",{maximumFractionDigits:1})}${un}</b></div>`;
  }

  async function carregarMinhasAvaliacoes(){
    const box = document.getElementById("avalBox");
    const { data, error } = await sb.from("assessments").select("*")
      .eq("student_id", ME.id).order("date",{ascending:false});
    if(!box) return;
    if(error){ box.innerHTML = `<div class="empty">Erro ao carregar: ${esc(error.message)}</div>`; return; }
    if(!data || !data.length){
      box.innerHTML = `<div class="empty">Você ainda não tem avaliações registradas.<br>Elas aparecerão aqui assim que sua nutricionista lançar a primeira.</div>`;
      return;
    }
    box.innerHTML = data.map((a,idx)=>avaliacaoDetalhe(a,idx)).join("");
  }

  /* ---------- ALUNO: CONSULTAS NUTRI ---------- */
  function viewConsultas(){
    return `<h2>Consultas Nutri</h2>
      <div class="card">
        <h3>📅 Próxima consulta</h3>
        <div id="proximaBox"><div class="empty">Carregando…</div></div>
      </div>
      <div class="card">
        <h3>🕐 Histórico</h3>
        <div id="histBox"><div class="empty">Carregando…</div></div>
      </div>`;
  }

  async function carregarMinhasConsultas(){
    const prox = document.getElementById("proximaBox"), hist = document.getElementById("histBox");
    const { data, error } = await sb.from("consultations").select("*")
      .eq("student_id", ME.id).order("scheduled_at",{ascending:false});
    if(error){
      if(prox) prox.innerHTML = `<div class="empty">Erro ao carregar: ${esc(error.message)}</div>`;
      if(hist) hist.innerHTML = "";
      return;
    }
    const agora = new Date();
    const futuras = (data||[]).filter(c=>new Date(c.scheduled_at) >= agora).sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
    const passadas= (data||[]).filter(c=>new Date(c.scheduled_at) <  agora);

    if(prox) prox.innerHTML = futuras.length
      ? `<div class="proxima">
           <div class="quando">${fmtDataHora(futuras[0].scheduled_at)}</div>
           ${futuras[0].notes ? `<div class="obs">${esc(futuras[0].notes)}</div>` : ""}
         </div>
         ${futuras.length>1 ? `<div class="meta-sm">+ ${futuras.length-1} outra(s) agendada(s)</div>` : ""}`
      : `<div class="empty">Nenhuma consulta agendada no momento.<br>Sua nutricionista agendará por aqui.</div>`;

    if(hist) hist.innerHTML = passadas.length
      ? passadas.map(c=>`<div class="aval">
          <div class="aval-head"><b>${fmtDataHora(c.scheduled_at)}</b></div>
          ${c.notes ? `<div class="obs">${esc(c.notes)}</div>` : `<div class="meta-sm">sem observações</div>`}
        </div>`).join("")
      : `<div class="empty">Nenhuma consulta realizada ainda.</div>`;
  }

  /* ================= TELA: PERFIL ================= */
  function viewPerfil(){
    const falta = !primeiroNome();
    return `<h2>Meu perfil</h2>
      <div class="card">
        <h3>👤 Meus dados</h3>
        <p>${falta ? "Informe seu nome para personalizar a saudação." : "Altere seu nome se precisar."}</p>
        <div class="field" style="margin-top:12px">
          <label>Nome completo</label>
          <input id="myName" type="text" value="${esc(ME.full_name||"")}" placeholder="ex: Pietra Rebello">
        </div>
        <div class="field"><label>E-mail</label><input type="text" value="${esc(ME.email||"")}" disabled></div>
        <button class="btn small" id="nameBtn" onclick="salvarNome()">Salvar nome</button>
        <div class="msg" id="nameMsg"></div>
      </div>

      <div class="card">
        <h3>🔐 Senha de acesso</h3>
        <p>Crie uma nova senha para entrar com e-mail e senha na próxima vez.</p>
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Nova senha</label><input id="np1" type="password" placeholder="mín. 6 caracteres"></div>
          <div class="field"><label>Confirmar nova senha</label><input id="np2" type="password" placeholder="repita a senha"></div>
        </div>
        <button class="btn small" id="pwBtn" onclick="definirSenha()">Salvar nova senha</button>
        <div class="msg" id="pwMsg"></div>
      </div>`;
  }

  async function salvarNome(){
    const v=document.getElementById("myName").value.trim();
    const msg=document.getElementById("nameMsg"), btn=document.getElementById("nameBtn");
    if(!v){ msg.className="msg err"; msg.textContent="Digite seu nome."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("profiles").update({ full_name:v }).eq("id", ME.id);
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro: "+error.message; return; }
    ME.full_name = v;
    montar();
  }

  function viewAdmin(){
    return `<h2>Painel do criador</h2>
      <div class="card"><h3>🛠️ Acesso total</h3>
      <p>Você tem acesso completo à estrutura: profissionais, alunos, dados e configurações.
         As telas de gestão de profissionais entram numa próxima etapa.</p></div>`;
  }

  /* ================= TELAS: PROFISSIONAL ================= */
  function viewAlunos(){
    return `<h2>Meus alunos</h2>
      <div class="card">
        <h3>👥 Ativos</h3>
        <div id="studentsBox"><div class="empty">Carregando…</div></div>
      </div>
      <div class="card" id="assessCard" style="display:none">
        <span class="close-x" onclick="fecharForm()">✕</span>
        <h3><span id="assessTitulo">➕ Nova avaliação —</span> <span id="assessStudentName"></span></h3>
        <input type="hidden" id="assessStudentId">
        <div class="grupo">
          <div class="grupo-tit">Dados gerais</div>
          <div class="form-grid3">
            <div class="field"><label>Data</label><input id="a_date" type="date"></div>
            <div class="field"><label>Peso (kg)</label><input id="a_weight" type="number" step="0.1" placeholder="ex: 68,5"></div>
            <div class="field"><label>Altura (cm)</label><input id="a_height" type="number" step="0.1" placeholder="ex: 175"></div>
            <div class="field"><label>% Gordura</label><input id="a_bf" type="number" step="0.1" placeholder="ex: 14,2"></div>
            <div class="field"><label>Massa magra (kg)</label><input id="a_lean" type="number" step="0.1"></div>
            <div class="field"><label>Massa gorda (kg)</label><input id="a_fat" type="number" step="0.1"></div>
          </div>
        </div>

        <div class="grupo">
          <div class="grupo-tit">Dobras cutâneas (mm)</div>
          <div class="form-grid3" id="gridDobras"></div>
        </div>

        <div class="grupo">
          <div class="grupo-tit">Circunferências (cm)</div>
          <div class="form-grid3" id="gridPerimetros"></div>
        </div>

        <div class="field" style="margin-top:16px"><label>Observação</label><textarea id="a_notes" rows="3" placeholder="opcional"></textarea></div>
        <button class="btn small" id="assessSaveBtn" onclick="salvarAvaliacao()">Salvar avaliação</button>
        <div class="msg" id="assessMsg"></div>
      </div>

      <div class="card" id="consultCard" style="display:none">
        <span class="close-x" onclick="fecharConsulta()">✕</span>
        <h3>📅 Consultas — <span id="consultStudentName"></span></h3>
        <input type="hidden" id="consultStudentId">
        <div class="form-grid">
          <div class="field"><label>Data</label><input id="c_date" type="date"></div>
          <div class="field"><label>Horário</label><input id="c_time" type="time" value="09:00"></div>
        </div>
        <div class="field"><label>Observações (opcional)</label><textarea id="c_notes" rows="2" placeholder="ex: retorno para ajuste do plano"></textarea></div>
        <button class="btn small" id="consultSaveBtn" onclick="salvarConsulta()">Agendar consulta</button>
        <div class="msg" id="consultMsg"></div>
        <div id="consultList" style="margin-top:14px"></div>
      </div>`;
  }

  function viewCadastrar(){
    return `<h2>Cadastrar aluno</h2>
      <div class="card">
        <h3>➕ Novo aluno</h3>
        <p>Informe nome e e-mail. Só depois disso o aluno consegue fazer o "primeiro acesso" na página de login — e já entra com o nome preenchido.</p>
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Nome e sobrenome</label><input id="inviteName" type="text" placeholder="ex: Maria Silva"></div>
          <div class="field"><label>E-mail</label><input id="inviteEmail" type="email" placeholder="email@exemplo.com"></div>
        </div>
        <button class="btn small" id="inviteBtn" onclick="cadastrarAluno()">Cadastrar aluno</button>
        <div class="msg" id="inviteMsg"></div>
      </div>
      <div class="card">
        <h3>📋 Cadastrados</h3>
        <div id="invitesBox"><div class="empty">Carregando…</div></div>
      </div>`;
  }

  function viewInativos(){
    return `<h2>Alunos inativos</h2>
      <div class="card">
        <h3>📁 Arquivados</h3>
        <p>Perderam o acesso ao painel, mas o histórico fica guardado. Reative quando voltarem.</p>
        <div id="archivedBox" style="margin-top:8px"></div>
      </div>`;
  }

  /* ================= DADOS ================= */
  async function loadStudents(){
    const { data: studs, error } = await sb.from("profiles").select("*").eq("professional_id", ME.id);
    if(error){
      const b=document.getElementById("studentsBox");
      if(b) b.innerHTML = `<div class="empty">Erro ao carregar: ${esc(error.message)}</div>`;
      return;
    }
    STUDENTS = studs || [];
    const { data: ast } = await sb.from("assessments")
      .select("id,student_id,date,weight,body_fat").order("date",{ascending:false});
    ASSESS = ast || [];
    renderStudents();
    loadInvites();
  }

  function linhaAluno(s, arquivado){
    const nome = nomeAluno(s);
    const n = ASSESS.filter(a=>a.student_id===s.id).length;
    const sub = (s.email && s.email!==nome) ? `${esc(s.email)} · ${n} avaliação(ões)` : `${n} avaliação(ões)`;
    const acoes = arquivado
      ? `<button class="btn small ghost" onclick="verAvaliacoes('${s.id}')">Ver histórico</button>
         <button class="btn small" onclick="reativarAluno('${s.id}')">Reativar</button>`
      : `<a class="btn small ghost" title="Ver dashboard" href="dashboard.html?aluno=${s.id}">📊</a>
         <button class="btn small ghost" onclick="verAvaliacoes('${s.id}')">Ver</button>
         <button class="btn small ghost" title="Agendar consulta" onclick="novaConsulta('${s.id}')">📅</button>
         <button class="btn small" onclick="novaAvaliacao('${s.id}')">Nova avaliação</button>
         <span class="menu-wrap">
           <button class="btn small ghost dots" title="Mais opções" onclick="abrirMenu(event,'menu_${s.id}')">⋮</button>
           <span class="menu-drop" id="menu_${s.id}">
             <button onclick="renomearAluno('${s.id}')">Editar nome</button>
             <button onclick="arquivarAluno('${s.id}')">Arquivar</button>
           </span>
         </span>`;
    return `<div class="student-row">
      <div><div class="name">${esc(nome)}</div><div class="meta">${sub}</div></div>
      <div class="row-actions">${acoes}</div>
      <div id="assessList_${s.id}" style="width:100%"></div>
    </div>`;
  }

  function renderStudents(){
    const ativos = STUDENTS.filter(s => (s.status||"active") === "active");
    const arqs   = STUDENTS.filter(s => s.status === "archived");
    const box = document.getElementById("studentsBox");
    if(box) box.innerHTML = ativos.length
      ? ativos.map(s=>linhaAluno(s,false)).join("")
      : `<div class="empty">Nenhum aluno ativo. Vá em "Cadastrar aluno" para começar.</div>`;
    const arq = document.getElementById("archivedBox");
    if(arq) arq.innerHTML = arqs.length
      ? arqs.map(s=>linhaAluno(s,true)).join("")
      : `<div class="empty">Nenhum aluno arquivado.</div>`;
  }

  async function loadInvites(){
    const { data } = await sb.from("invites").select("*")
      .eq("professional_id", ME.id).order("created_at",{ascending:false});
    INVITES = data || [];
    renderInvites();
  }

  function renderInvites(){
    const box = document.getElementById("invitesBox");
    if(!box) return;
    if(!INVITES.length){ box.innerHTML = `<div class="empty">Nenhum aluno cadastrado ainda.</div>`; return; }
    const entraram = new Set(STUDENTS.map(s=>(s.email||"").toLowerCase()));
    box.innerHTML = INVITES.map(iv=>{
      const ativo = entraram.has(iv.email.toLowerCase());
      const status = ativo
        ? `<span class="tag" style="background:#eafaf0;color:#1a8a4a;border-color:#bbeccb">já entrou</span>`
        : `<span class="tag">aguardando 1º acesso</span>`;
      return `<div class="student-row">
        <div><div class="name">${esc(iv.full_name || iv.email)}</div>
             <div class="meta">${iv.full_name ? esc(iv.email)+" · " : ""}${status}</div></div>
        <div class="row-actions"><button class="btn small ghost" onclick="removerConvite('${esc(iv.email)}')">Remover</button></div>
      </div>`;
    }).join("");
  }

  async function cadastrarAluno(){
    const nome  = document.getElementById("inviteName").value.trim();
    const email = document.getElementById("inviteEmail").value.trim().toLowerCase();
    const msg = document.getElementById("inviteMsg"), btn = document.getElementById("inviteBtn");
    if(!nome){ msg.className="msg err"; msg.textContent="Digite o nome do aluno."; return; }
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.className="msg err"; msg.textContent="Digite um e-mail válido."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("invites").insert({ email, full_name:nome, professional_id:ME.id });
    btn.disabled=false;
    if(error){
      msg.className="msg err";
      msg.textContent = /duplicate|unique/i.test(error.message) ? "Esse e-mail já está cadastrado." : "Erro: "+error.message;
      return;
    }
    msg.className="msg ok"; msg.textContent = nome+" cadastrado! Agora ele pode fazer o primeiro acesso.";
    document.getElementById("inviteName").value=""; document.getElementById("inviteEmail").value="";
    loadInvites();
  }

  async function removerConvite(email){
    if(!confirm("Remover o cadastro de "+email+"?\n\n(não apaga a conta já criada, apenas o cadastro do e-mail)")) return;
    const { error } = await sb.from("invites").delete().eq("email", email).eq("professional_id", ME.id);
    if(error){ alert("Erro ao remover: "+error.message); return; }
    loadInvites();
  }

  function abrirMenu(ev, id){
    ev.stopPropagation();
    const alvo = document.getElementById(id);
    const aberto = alvo && alvo.classList.contains("open");
    document.querySelectorAll(".menu-drop.open").forEach(m=>m.classList.remove("open"));
    if(alvo && !aberto) alvo.classList.add("open");
  }
  document.addEventListener("click", ()=>{
    document.querySelectorAll(".menu-drop.open").forEach(m=>m.classList.remove("open"));
  });

  async function renomearAluno(id){
    const s = STUDENTS.find(x=>x.id===id);
    const novo = prompt("Nome do aluno:", s?.full_name || "");
    if(novo === null) return;
    const { error } = await sb.from("profiles").update({ full_name: novo.trim()||null }).eq("id", id);
    if(error){ alert("Erro ao salvar o nome: "+error.message); return; }
    loadStudents();
  }

  async function arquivarAluno(id){
    const s = STUDENTS.find(x=>x.id===id);
    if(!confirm(`Arquivar ${nomeAluno(s)}?\n\nEle perde o acesso ao painel, mas todo o histórico fica guardado e você pode reativar depois.`)) return;
    const { error } = await sb.from("profiles")
      .update({ status:"archived", archived_at:new Date().toISOString() }).eq("id", id);
    if(error){ alert("Erro ao arquivar: "+error.message); return; }
    loadStudents();
  }

  async function reativarAluno(id){
    const { error } = await sb.from("profiles").update({ status:"active", archived_at:null }).eq("id", id);
    if(error){ alert("Erro ao reativar: "+error.message); return; }
    loadStudents();
  }

  function chips(obj, lista, un){
    if(!obj) return "";
    const itens = lista.filter(([k])=>obj[k]!=null)
      .map(([k,r])=>`<div class="med"><span>${r}</span><b>${Number(obj[k]).toLocaleString("pt-BR",{maximumFractionDigits:1})}${un}</b></div>`);
    return itens.length ? itens.join("") : "";
  }

  function avaliacaoDetalhe(a, idx, podeEditar){
    const gerais = GERAIS.filter(([k])=>a[k]!=null)
      .map(([k,r,un])=>`<div class="med"><span>${r}</span><b>${Number(a[k]).toLocaleString("pt-BR",{maximumFractionDigits:1})}${un}</b></div>`).join("");
    const dob = chips(a.skinfolds, DOBRAS, " mm");
    const per = chips(a.circumferences, PERIMETROS, " cm");
    const menu = podeEditar ? `<span class="menu-wrap">
        <button class="btn small ghost dots" title="Mais opções" onclick="abrirMenu(event,'am_${a.id}')">⋮</button>
        <span class="menu-drop" id="am_${a.id}">
          <button onclick="editarAvaliacao('${a.id}','${a.student_id}')">Editar</button>
          <button onclick="excluirAvaliacao('${a.id}','${a.student_id}')">Excluir avaliação</button>
        </span></span>` : "";
    return `<div class="aval" id="av_${a.id}">
      <div class="aval-head">
        <button class="chev" title="Mostrar medidas" onclick="toggleAval('av_${a.id}')">▶</button>
        <b>${fmtDate(a.date)}</b>
        ${idx===0?'<span class="tag" style="background:#eafaf0;color:#1a8a4a;border-color:#bbeccb">mais recente</span>':''}
        <span style="margin-left:auto">${menu}</span>
      </div>
      <div class="aval-body">
        ${gerais ? `<div class="meds">${gerais}</div>` : ""}
        ${dob ? `<div class="grupo-tit" style="margin-top:14px">Dobras cutâneas</div><div class="meds">${dob}</div>` : ""}
        ${per ? `<div class="grupo-tit" style="margin-top:14px">Circunferências</div><div class="meds">${per}</div>` : ""}
        ${a.notes ? `<div class="obs"><b>Observação:</b> ${esc(a.notes)}</div>` : ""}
        ${!gerais && !dob && !per && !a.notes ? `<div class="empty">Sem medidas registradas nesta avaliação.</div>` : ""}
      </div>
    </div>`;
  }

  async function verAvaliacoes(id){
    const el = document.getElementById("assessList_"+id);
    if(!el) return;
    if(el.innerHTML){ el.innerHTML=""; return; }
    el.innerHTML = `<div class="empty">Carregando…</div>`;
    const { data, error } = await sb.from("assessments").select("*")
      .eq("student_id", id).order("date",{ascending:false});
    if(error){ el.innerHTML = `<div class="empty">Erro: ${esc(error.message)}</div>`; return; }
    el.innerHTML = (data && data.length)
      ? `<div style="margin-top:12px">${data.map((a,i)=>avaliacaoDetalhe(a,i,true)).join("")}</div>`
      : `<div class="empty">Sem avaliações ainda.</div>`;
  }

  function montarCamposMedidas(){
    const g1 = document.getElementById("gridDobras"), g2 = document.getElementById("gridPerimetros");
    if(g1 && !g1.innerHTML) g1.innerHTML = DOBRAS.map(([k,r])=>
      `<div class="field"><label>${r}</label><input id="dob_${k}" type="number" step="0.1"></div>`).join("");
    if(g2 && !g2.innerHTML) g2.innerHTML = PERIMETROS.map(([k,r])=>
      `<div class="field"><label>${r}</label><input id="per_${k}" type="number" step="0.1"></div>`).join("");
  }

  function toggleAval(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.toggle("open");
    const c = el.querySelector(".chev");
    if(c) c.title = el.classList.contains("open") ? "Ocultar medidas" : "Mostrar medidas";
  }

  async function excluirAvaliacao(avalId, studentId){
    if(!confirm("Excluir esta avaliação?\n\nTodos os dados dela serão apagados. Não dá para desfazer.")) return;
    const { error } = await sb.from("assessments").delete().eq("id", avalId);
    if(error){ alert("Erro ao excluir: "+error.message); return; }
    await loadStudents();
    const lista = document.getElementById("assessList_"+studentId);
    if(lista){ lista.innerHTML=""; verAvaliacoes(studentId); }
  }

  async function editarAvaliacao(avalId, studentId){
    const { data: a, error } = await sb.from("assessments").select("*").eq("id", avalId).single();
    if(error || !a){ alert("Não consegui carregar esta avaliação."+(error?" "+error.message:"")); return; }
    montarCamposMedidas();
    EDIT_ID = avalId;
    const s = STUDENTS.find(x=>x.id===studentId);
    document.getElementById("assessStudentId").value = studentId;
    document.getElementById("assessStudentName").textContent = nomeAluno(s);
    document.getElementById("assessTitulo").textContent = "✏️ Editar avaliação —";
    document.getElementById("assessSaveBtn").textContent = "Salvar alterações";

    const põe = (id, v) => { const e=document.getElementById(id); if(e) e.value = (v==null?"":v); };
    põe("a_date", a.date ? String(a.date).slice(0,10) : "");
    põe("a_weight", a.weight); põe("a_height", a.height); põe("a_bf", a.body_fat);
    põe("a_lean", a.lean_mass); põe("a_fat", a.fat_mass);
    DOBRAS.forEach(([k])=>põe("dob_"+k, a.skinfolds ? a.skinfolds[k] : null));
    PERIMETROS.forEach(([k])=>põe("per_"+k, a.circumferences ? a.circumferences[k] : null));
    põe("a_notes", a.notes);

    const card = document.getElementById("assessCard");
    card.style.display = "block";
    const m = document.getElementById("assessMsg"); m.className="msg"; m.textContent="";
    card.scrollIntoView({behavior:"smooth",block:"center"});
  }

  function novaAvaliacao(id){
    const s = STUDENTS.find(x=>x.id===id);
    montarCamposMedidas();
    EDIT_ID = null;
    document.getElementById("assessTitulo").textContent = "➕ Nova avaliação —";
    document.getElementById("assessSaveBtn").textContent = "Salvar avaliação";
    document.getElementById("assessStudentId").value = id;
    document.getElementById("assessStudentName").textContent = nomeAluno(s);
    document.getElementById("a_date").value = new Date().toISOString().slice(0,10);
    ["a_weight","a_height","a_bf","a_lean","a_fat","a_notes"].forEach(f=>{const e=document.getElementById(f); if(e) e.value="";});
    DOBRAS.forEach(([k])=>{const e=document.getElementById("dob_"+k); if(e) e.value="";});
    PERIMETROS.forEach(([k])=>{const e=document.getElementById("per_"+k); if(e) e.value="";});
    const card = document.getElementById("assessCard");
    card.style.display="block";
    const m=document.getElementById("assessMsg"); m.className="msg"; m.textContent="";
    card.scrollIntoView({behavior:"smooth",block:"center"});
  }
  function fecharForm(){ const c=document.getElementById("assessCard"); if(c) c.style.display="none"; }

  /* ---------- PROFISSIONAL: CONSULTAS ---------- */
  function novaConsulta(id){
    const s = STUDENTS.find(x=>x.id===id);
    document.getElementById("consultStudentId").value = id;
    document.getElementById("consultStudentName").textContent = nomeAluno(s);
    document.getElementById("c_date").value = "";
    document.getElementById("c_time").value = "09:00";
    document.getElementById("c_notes").value = "";
    const card = document.getElementById("consultCard");
    card.style.display = "block";
    const m = document.getElementById("consultMsg"); m.className="msg"; m.textContent="";
    listarConsultas(id);
    card.scrollIntoView({behavior:"smooth",block:"center"});
  }
  function fecharConsulta(){ const c=document.getElementById("consultCard"); if(c) c.style.display="none"; }

  async function listarConsultas(id){
    const box = document.getElementById("consultList");
    const { data, error } = await sb.from("consultations").select("*")
      .eq("student_id", id).order("scheduled_at",{ascending:false});
    if(!box) return;
    if(error){ box.innerHTML = `<div class="empty">Erro: ${esc(error.message)}</div>`; return; }
    if(!data || !data.length){ box.innerHTML = `<div class="empty">Nenhuma consulta agendada para este aluno.</div>`; return; }
    const agora = new Date();
    box.innerHTML = data.map(c=>{
      const futura = new Date(c.scheduled_at) >= agora;
      const et = futura
        ? `<span class="tag" style="background:#eef4ff;color:#1d4ed8;border-color:#c7dbff">agendada</span>`
        : `<span class="tag">realizada</span>`;
      return `<div class="student-row">
        <div><div class="name">${fmtDataHora(c.scheduled_at)} ${et}</div>
             ${c.notes?`<div class="meta">${esc(c.notes)}</div>`:""}</div>
        <div class="row-actions"><button class="btn small ghost" onclick="excluirConsulta('${c.id}','${id}')">Remover</button></div>
      </div>`;
    }).join("");
  }

  async function salvarConsulta(){
    const msg=document.getElementById("consultMsg"), btn=document.getElementById("consultSaveBtn");
    const student_id=document.getElementById("consultStudentId").value;
    const d=document.getElementById("c_date").value, h=document.getElementById("c_time").value || "09:00";
    if(!student_id || !d){ msg.className="msg err"; msg.textContent="Escolha a data da consulta."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("consultations").insert({
      student_id, scheduled_at: new Date(`${d}T${h}`).toISOString(),
      notes: document.getElementById("c_notes").value.trim() || null,
      created_by: ME.id
    });
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro ao agendar: "+error.message; return; }
    msg.className="msg ok"; msg.textContent="Consulta agendada!";
    document.getElementById("c_notes").value="";
    listarConsultas(student_id);
  }

  async function excluirConsulta(id, studentId){
    if(!confirm("Remover esta consulta?")) return;
    const { error } = await sb.from("consultations").delete().eq("id", id);
    if(error){ alert("Erro ao remover: "+error.message); return; }
    listarConsultas(studentId);
  }

  async function salvarAvaliacao(){
    const msg=document.getElementById("assessMsg"), btn=document.getElementById("assessSaveBtn");
    const student_id=document.getElementById("assessStudentId").value;
    const date=document.getElementById("a_date").value;
    if(!student_id || !date){ msg.className="msg err"; msg.textContent="Escolha aluno e data."; return; }
    const val = id => { const e=document.getElementById(id); return (!e || e.value==="") ? null : Number(e.value); };
    const juntar = (pref, lista) => {
      const o = {};
      lista.forEach(([k])=>{ const v = val(pref+k); if(v!=null) o[k]=v; });
      return Object.keys(o).length ? o : null;
    };
    const row = { student_id, date,
      weight:   val("a_weight"),
      height:   val("a_height"),
      body_fat: val("a_bf"),
      lean_mass:val("a_lean"),
      fat_mass: val("a_fat"),
      skinfolds:      juntar("dob_", DOBRAS),
      circumferences: juntar("per_", PERIMETROS),
      notes:    document.getElementById("a_notes").value.trim() || null,
      created_by: ME.id };
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    let error;
    if(EDIT_ID){
      const { created_by, ...campos } = row;
      ({ error } = await sb.from("assessments").update(campos).eq("id", EDIT_ID));
    } else {
      ({ error } = await sb.from("assessments").insert(row));
    }
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro ao salvar: "+error.message; return; }
    msg.className="msg ok"; msg.textContent = EDIT_ID ? "Alterações salvas!" : "Avaliação salva!";
    const alvo = student_id;
    EDIT_ID = null;
    await loadStudents();
    const lista = document.getElementById("assessList_"+alvo);
    if(lista && lista.innerHTML){ lista.innerHTML=""; verAvaliacoes(alvo); }
    setTimeout(fecharForm, 800);
  }

  init();
</script>
</body>
</html>
