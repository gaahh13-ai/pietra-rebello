<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha área — Pietra Rebello</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{color-scheme:light;--txt:#4b3b58;--muted:#9a8aa6;--line:#f2e2ec;--pink:#ec4899;--pink-deep:#db2777;--blue-deep:#3b82f6;--accent2:#16a34a}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body{min-height:100vh;background:linear-gradient(180deg,#fdf2f8,#f6f1fe 45%,#eef5ff);color:var(--txt)}
  nav{background:rgba(253,244,248,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  nav .in{max-width:960px;margin:0 auto;padding:0 20px;height:66px;display:flex;align-items:center;justify-content:space-between}
  .logo{height:32px}
  .logout{border:1.5px solid var(--pink);color:var(--pink-deep);background:#fff;border-radius:12px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .wrap{max-width:960px;margin:0 auto;padding:32px 20px}
  .hello{font-size:22px;font-weight:800;margin-bottom:4px}
  .role-chip{display:inline-block;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;margin-bottom:20px}
  .chip-creator{background:#ede9fe;color:#6d28d9}
  .chip-professional{background:#dbeafe;color:#1d4ed8}
  .chip-student{background:#fce7f3;color:#be185d}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 22px rgba(180,90,140,.06);margin-bottom:16px}
  .card h3{font-size:15px;font-weight:800;color:var(--pink-deep);margin-bottom:8px}
  .card p{font-size:14px;color:var(--muted);line-height:1.55}
  .btn{display:inline-block;border:none;border-radius:12px;padding:11px 20px;font-weight:700;font-size:14px;color:#fff;cursor:pointer;text-decoration:none;
    background:linear-gradient(120deg,#f472b6,#818cf8);box-shadow:0 6px 16px rgba(236,72,153,.2);margin-top:8px}
  .btn.small{padding:8px 14px;font-size:13px;box-shadow:none}
  .btn.ghost{background:#fff;color:var(--pink-deep);border:1.5px solid var(--line)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .tag{display:inline-block;background:#fff7ed;color:#b45309;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid #fed7aa}
  #loading{text-align:center;padding:80px 20px;color:var(--muted)}
  .code-box{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .code-box code{background:#faf3f8;border:1px dashed var(--pink);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--pink-deep);word-break:break-all;flex:1;min-width:200px}
  .student-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .student-row:last-child{border-bottom:none}
  .student-row .name{font-weight:700;font-size:14px}
  .student-row .meta{font-size:12px;color:var(--muted)}
  .row-actions{display:flex;gap:8px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #f9a8d4;border-color:#f9a8d4}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.form-grid{grid-template-columns:1fr}}
  .msg{margin-top:10px;font-size:13px;padding:9px 11px;border-radius:9px;display:none;line-height:1.4}
  .msg.err{display:block;background:#fdecec;color:#c0392b}
  .msg.ok{display:block;background:#eafaf0;color:#1a8a4a}
  .empty{font-size:13px;color:var(--muted);padding:8px 0}
  .assess-item{font-size:13px;color:var(--txt);padding:8px 0;border-bottom:1px dashed var(--line)}
  .assess-item:last-child{border-bottom:none}
  .assess-item b{color:var(--pink-deep)}
  .close-x{float:right;cursor:pointer;color:var(--muted);font-weight:800;font-size:18px;line-height:1}
</style>
</head>
<body>
<nav><div class="in"><a href="index.html"><img class="logo" src="logo.png" alt="Pietra Rebello"></a><button class="logout" onclick="sair()">Sair</button></div></nav>
<div class="wrap">
  <div id="loading">Carregando…</div>
  <div id="content" style="display:none"></div>
</div>

<script>
  const SUPABASE_URL = "https://qubjknesswejsddcapom.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1YmprbmVzc3dlanNkZGNhcG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNTYzNTYsImV4cCI6MjA5OTkzMjM1Nn0._nDLQ_Q5wN-4eNS0jf-lnyhGHixoZ5_SdXvTvBV_d3E";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { flowType: "implicit", detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
  });
  let ME = null;            // meu profile
  let STUDENTS = [];        // alunos do profissional (já entraram)
  let INVITES = [];         // e-mails cadastrados (convites)
  let ASSESS = [];          // avaliações dos meus alunos

  async function sair(){ await sb.auth.signOut(); location.href = "login.html"; }
  function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
  function fmtDate(d){ if(!d) return "—"; const p=String(d).slice(0,10).split("-"); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
  function shortId(id){ return String(id||"").slice(0,8); }

  async function init(){
    let { data:{ session } } = await sb.auth.getSession();
    if(!session){
      // o link do e-mail pode ainda estar sendo processado; espera um evento de login
      session = await new Promise(res=>{
        const t = setTimeout(()=>res(null), 2500);
        sb.auth.onAuthStateChange((_e, s)=>{ if(s){ clearTimeout(t); res(s); } });
      });
    }
    if(!session){ location.href = "login.html"; return; }
    const user = session.user;
    let { data: profile } = await sb.from("profiles").select("*").eq("id", user.id).single();
    if(!profile){ profile = { id:user.id, role:"student", full_name:null, professional_id:null }; }
    ME = { ...profile, email:user.email };
    render();
  }

  function primeiroNome(){
    const n = (ME.full_name || "").trim();
    return n ? n.split(/\s+/)[0] : "";
  }

  function perfilHTML(){
    const falta = !primeiroNome();
    return `
      <div class="card">
        <h3>👤 Meu perfil</h3>
        <p>${falta ? "Informe seu nome para personalizar a saudação." : "Altere seu nome se precisar."}</p>
        <div class="field" style="margin-top:12px">
          <label>Nome completo</label>
          <input id="myName" type="text" value="${esc(ME.full_name || "")}" placeholder="ex: Pietra Rebello">
        </div>
        <button class="btn small" id="nameBtn" onclick="salvarNome()">Salvar nome</button>
        <div class="msg" id="nameMsg"></div>
      </div>`;
  }

  async function salvarNome(){
    const v = document.getElementById("myName").value.trim();
    const msg = document.getElementById("nameMsg"), btn = document.getElementById("nameBtn");
    if(!v){ msg.className="msg err"; msg.textContent="Digite seu nome."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("profiles").update({ full_name: v }).eq("id", ME.id);
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro: "+error.message; return; }
    ME.full_name = v;
    render();
  }

  function render(){
    const role = ME.role || "student";
    const rotulo = {creator:"Criador", professional:"Profissional", student:"Aluno"}[role] || role;
    const first = primeiroNome();
    let html = `<div class="hello">${first ? "Olá, "+esc(first)+" 👋" : "Olá! 👋"}</div>
                <div class="role-chip chip-${role}">${rotulo}</div>`;

    if(!first) html += perfilHTML();   // sem nome: pede logo no topo

    if(role === "student")            html += studentHTML();
    else if(role === "professional")  html += professionalHTML();
    else if(role === "creator")       html += creatorHTML();

    if(first) html += perfilHTML();    // já tem nome: fica no fim

    document.getElementById("content").innerHTML = html;
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";

    if(role === "professional" || role === "creator") loadStudents();
  }

  /* ---------------- ALUNO ---------------- */
  function studentHTML(){
    const linked = !!ME.professional_id;
    let h = `
      <div class="card">
        <h3>📊 Seu dashboard</h3>
        <p>Acompanhe sua evolução — peso, composição, sono, adesão — e envie seus reports pelo Telegram.</p>
        <a class="btn" href="https://gaahh13-ai.github.io/dashboard-saude/" target="_blank">Abrir meu dashboard →</a>
      </div>
      <div class="card">
        <h3>🔐 Minha senha de acesso</h3>
        <p>Defina (ou altere) sua senha para entrar na próxima vez direto com e-mail e senha.</p>
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Nova senha</label><input id="np1" type="password" placeholder="mín. 6 caracteres"></div>
          <div class="field"><label>Confirmar senha</label><input id="np2" type="password" placeholder="repita a senha"></div>
        </div>
        <button class="btn small" id="pwBtn" onclick="definirSenha()">Salvar senha</button>
        <div class="msg" id="pwMsg"></div>
      </div>`;
    if(linked){
      h += `<div class="card"><h3>✅ Acompanhamento ativo</h3><p>Você está conectado ao seu profissional. As avaliações lançadas por ele aparecerão aqui.</p></div>`;
    }
    return h;
  }

  async function definirSenha(){
    const p1 = document.getElementById("np1").value, p2 = document.getElementById("np2").value;
    const msg = document.getElementById("pwMsg"), btn = document.getElementById("pwBtn");
    if(p1.length < 6){ msg.className="msg err"; msg.textContent="A senha precisa ter ao menos 6 caracteres."; return; }
    if(p1 !== p2){ msg.className="msg err"; msg.textContent="As senhas não coincidem."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.auth.updateUser({ password: p1 });
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro: "+error.message; return; }
    msg.className="msg ok"; msg.textContent="Senha salva! Já pode entrar com e-mail e senha.";
    document.getElementById("np1").value=""; document.getElementById("np2").value="";
  }

  /* ---------------- PROFISSIONAL ---------------- */
  function professionalHTML(){
    return `
      <div class="card">
        <h3>➕ Cadastrar aluno</h3>
        <p>Cadastre o e-mail do aluno. Só depois disso ele consegue fazer o "primeiro acesso" na página de login e receber o link de acesso.</p>
        <div class="field" style="margin-top:12px"><input id="inviteEmail" type="email" placeholder="email-do-aluno@exemplo.com"></div>
        <button class="btn small" id="inviteBtn" onclick="cadastrarAluno()">Cadastrar e-mail</button>
        <div class="msg" id="inviteMsg"></div>
        <div id="invitesBox" style="margin-top:14px"></div>
      </div>

      <div class="card">
        <h3>👥 Meus alunos</h3>
        <div id="studentsBox"><div class="empty">Carregando alunos…</div></div>
      </div>

      <div class="card" id="assessCard" style="display:none">
        <span class="close-x" onclick="fecharForm()">✕</span>
        <h3>➕ Nova avaliação — <span id="assessStudentName"></span></h3>
        <input type="hidden" id="assessStudentId">
        <div class="form-grid">
          <div class="field"><label>Data</label><input id="a_date" type="date"></div>
          <div class="field"><label>Peso (kg)</label><input id="a_weight" type="number" step="0.1" placeholder="ex: 68.5"></div>
          <div class="field"><label>% Gordura</label><input id="a_bf" type="number" step="0.1" placeholder="ex: 14.2"></div>
          <div class="field"><label>Massa magra (kg)</label><input id="a_lean" type="number" step="0.1" placeholder="opcional"></div>
          <div class="field"><label>Massa gorda (kg)</label><input id="a_fat" type="number" step="0.1" placeholder="opcional"></div>
        </div>
        <div class="field"><label>Observações</label><textarea id="a_notes" rows="2" placeholder="opcional"></textarea></div>
        <button class="btn small" id="assessSaveBtn" onclick="salvarAvaliacao()">Salvar avaliação</button>
        <div class="msg" id="assessMsg"></div>
      </div>`;
  }

  function creatorHTML(){
    return `<div class="card"><h3>🛠️ Painel do criador</h3><p>Acesso total à estrutura. Abaixo você também vê a visão de profissional (alunos vinculados a você).</p></div>`
      + professionalHTML();
  }

  async function cadastrarAluno(){
    const emailRaw = document.getElementById("inviteEmail").value.trim();
    const email = emailRaw.toLowerCase();
    const msg = document.getElementById("inviteMsg"), btn = document.getElementById("inviteBtn");
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ msg.className="msg err"; msg.textContent="Digite um e-mail válido."; return; }
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("invites").insert({ email, professional_id: ME.id });
    btn.disabled=false;
    if(error){
      if(/duplicate|unique/i.test(error.message)){ msg.className="msg err"; msg.textContent="Esse e-mail já está cadastrado."; }
      else { msg.className="msg err"; msg.textContent="Erro: "+error.message; }
      return;
    }
    msg.className="msg ok"; msg.textContent="E-mail cadastrado! Agora o aluno pode fazer o primeiro acesso.";
    document.getElementById("inviteEmail").value="";
    loadInvites();
  }

  async function loadInvites(){
    const { data } = await sb.from("invites").select("*").eq("professional_id", ME.id).order("created_at",{ascending:false});
    INVITES = data || [];
    renderInvites();
  }

  function renderInvites(){
    const box = document.getElementById("invitesBox");
    if(!box) return;
    if(INVITES.length === 0){ box.innerHTML = `<div class="empty">Nenhum e-mail cadastrado ainda.</div>`; return; }
    const joined = new Set(STUDENTS.map(s=>(s.email||"").toLowerCase()));
    box.innerHTML = INVITES.map(iv=>{
      const ativo = joined.has(iv.email.toLowerCase());
      const status = ativo
        ? `<span class="tag" style="background:#eafaf0;color:#1a8a4a;border-color:#bbeccb">ativo</span>`
        : `<span class="tag">aguardando 1º acesso</span>`;
      return `<div class="student-row">
        <div><div class="name">${esc(iv.email)}</div><div class="meta">${status}</div></div>
        <div class="row-actions"><button class="btn small ghost" onclick="removerConvite('${esc(iv.email)}')">Remover</button></div>
      </div>`;
    }).join("");
  }

  async function removerConvite(email){
    if(!confirm("Remover o cadastro de "+email+"? (não apaga a conta já criada, só o cadastro do e-mail)")) return;
    const { error } = await sb.from("invites").delete().eq("email", email).eq("professional_id", ME.id);
    if(error){ alert("Erro ao remover: "+error.message); return; }
    loadInvites();
  }

  async function loadStudents(){
    const box = document.getElementById("studentsBox");
    const { data: studs, error } = await sb.from("profiles").select("*").eq("professional_id", ME.id);
    if(error){ if(box) box.innerHTML = `<div class="empty">Erro ao carregar: ${esc(error.message)}</div>`; return; }
    STUDENTS = studs || [];
    const { data: ast } = await sb.from("assessments").select("id,student_id,date,weight,body_fat").order("date",{ascending:false});
    ASSESS = ast || [];
    renderStudents();
    loadInvites();
  }

  function renderStudents(){
    const box = document.getElementById("studentsBox");
    if(!box) return;
    if(STUDENTS.length === 0){
      box.innerHTML = `<div class="empty">Nenhum aluno conectado ainda. Compartilhe seu código de convite acima.</div>`;
      return;
    }
    box.innerHTML = STUDENTS.map(s=>{
      const nome = nomeAluno(s);
      const n = ASSESS.filter(a=>a.student_id===s.id).length;
      const sub = (s.email && s.email !== nome) ? `${esc(s.email)} · ${n} avaliação(ões)` : `${n} avaliação(ões)`;
      return `<div class="student-row">
        <div><div class="name">${esc(nome)}</div><div class="meta">${sub}</div></div>
        <div class="row-actions">
          <button class="btn small ghost" title="Editar nome" onclick="renomearAluno('${s.id}')">✏️</button>
          <button class="btn small ghost" onclick="verAvaliacoes('${s.id}')">Ver</button>
          <button class="btn small" onclick="novaAvaliacao('${s.id}')">Nova avaliação</button>
          <button class="btn small ghost" title="Excluir aluno" style="color:#c0392b;border-color:#f3c9c9" onclick="excluirAluno('${s.id}')">🗑</button>
        </div>
        <div id="assessList_${s.id}" style="width:100%"></div>
      </div>`;
    }).join("");
  }

  function nomeAluno(s){
    if(!s) return "Aluno";
    return s.full_name || s.email || ("Aluno "+shortId(s.id));
  }

  async function renomearAluno(id){
    const s = STUDENTS.find(x=>x.id===id);
    const novo = prompt("Nome do aluno:", s?.full_name || "");
    if(novo === null) return;
    const { error } = await sb.from("profiles").update({ full_name: novo.trim() || null }).eq("id", id);
    if(error){ alert("Erro ao salvar o nome: "+error.message); return; }
    loadStudents();
  }

  async function excluirAluno(id){
    const s = STUDENTS.find(x=>x.id===id);
    const nome = nomeAluno(s);
    if(!confirm(`Excluir ${nome}?\n\nIsso apaga TODAS as avaliações e o vínculo com você, e remove o e-mail da lista de cadastrados. Não dá para desfazer.`)) return;
    if(s?.email){
      await sb.from("invites").delete().eq("email", s.email.toLowerCase()).eq("professional_id", ME.id);
    }
    const { error } = await sb.from("profiles").delete().eq("id", id);
    if(error){ alert("Erro ao excluir: "+error.message); return; }
    loadStudents();
  }

  function verAvaliacoes(id){
    const el = document.getElementById("assessList_"+id);
    if(!el) return;
    if(el.innerHTML){ el.innerHTML=""; return; }
    const list = ASSESS.filter(a=>a.student_id===id);
    if(list.length===0){ el.innerHTML = `<div class="assess-item">Sem avaliações ainda.</div>`; return; }
    el.innerHTML = list.map(a=>`<div class="assess-item">${fmtDate(a.date)} — <b>${a.weight??"—"} kg</b>${a.body_fat!=null?` · ${a.body_fat}% gordura`:""}</div>`).join("");
  }

  function novaAvaliacao(id){
    const s = STUDENTS.find(x=>x.id===id);
    document.getElementById("assessStudentId").value = id;
    document.getElementById("assessStudentName").textContent = nomeAluno(s);
    document.getElementById("a_date").value = new Date().toISOString().slice(0,10);
    ["a_weight","a_bf","a_lean","a_fat","a_notes"].forEach(f=>document.getElementById(f).value="");
    const card = document.getElementById("assessCard");
    card.style.display="block";
    document.getElementById("assessMsg").className="msg";
    document.getElementById("assessMsg").textContent="";
    card.scrollIntoView({behavior:"smooth",block:"center"});
  }
  function fecharForm(){ document.getElementById("assessCard").style.display="none"; }

  async function salvarAvaliacao(){
    const msg = document.getElementById("assessMsg");
    const btn = document.getElementById("assessSaveBtn");
    const student_id = document.getElementById("assessStudentId").value;
    const date = document.getElementById("a_date").value;
    if(!student_id || !date){ msg.className="msg err"; msg.textContent="Escolha aluno e data."; return; }
    const num = v => v==="" ? null : Number(v);
    const row = {
      student_id, date,
      weight: num(document.getElementById("a_weight").value),
      body_fat: num(document.getElementById("a_bf").value),
      lean_mass: num(document.getElementById("a_lean").value),
      fat_mass: num(document.getElementById("a_fat").value),
      notes: document.getElementById("a_notes").value.trim() || null,
      created_by: ME.id
    };
    btn.disabled=true; msg.className="msg"; msg.textContent="";
    const { error } = await sb.from("assessments").insert(row);
    btn.disabled=false;
    if(error){ msg.className="msg err"; msg.textContent="Erro ao salvar: "+error.message; return; }
    msg.className="msg ok"; msg.textContent="Avaliação salva!";
    await loadStudents();
    setTimeout(fecharForm, 800);
  }

  init();
</script>
</body>
</html>
